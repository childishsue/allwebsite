<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Utilization</title>
    <link rel="stylesheet" href="../assets/style/main.min.css">
    <script src="../assets/js/vue.global.js"></script>
    <script src="../assets/js/jquery.min.js"></script>
    <script src="../assets/js/all.js"></script>
  </head>
  <body>
    <header class="allPage"><a class="logo" href="login.html">
        <figure><img class="for_pc" src="../assets/img/logo_horizontal_w.png"><img class="for_phone" src="../assets/img/logo_horizontal.png"></figure></a>
      <nav class="for_pc">
        <ul class="keyOption">
          <li><a href="income.html">收益</a></li>
          <li><a href="tradeIndex.html">交易</a></li>
          <li><a href="history.html">紀錄</a></li>
          <li><a href="memberCenter.html">個人</a></li>
        </ul>
      </nav>
    </header>
    <aside class="mobileNav for_phone">
      <ul>
        <li><a href="income.html">
            <figure><img src="../assets/img/icon/income.png">
              <figcaption>
                <h5>收益</h5>
              </figcaption>
            </figure></a></li>
        <li><a href="tradeIndex.html">
            <figure><img src="../assets/img/icon/trade.png">
              <figcaption>
                <h5>交易</h5>
              </figcaption>
            </figure></a></li>
        <li><a href="history.html">
            <figure><img src="../assets/img/icon/history.png">
              <figcaption>
                <h5>紀錄</h5>
              </figcaption>
            </figure></a></li>
        <li><a href="memberCenter.html">
            <figure><img src="../assets/img/icon/user.png">
              <figcaption>
                <h5>個人</h5>
              </figcaption>
            </figure></a></li>
      </ul>
    </aside>
    <main class="income" id="vFunction">
      <article>
        <h1>收益</h1>
        <section>
          <div class="titleBlock">
            <h2>{{ filterLabel }}</h2><a class="filterBtn" @click="toggleFilterList" ref="filterBtn" href="#">篩選</a>
            <ul class="filterList" v-show="isFilterListVisible" ref="filterList">
              <li><a @click.prevent="setFilter('week', '當週')" href="#">當週</a></li>
              <li><a @click.prevent="setFilter('month', '當月')" href="#">當月</a></li>
              <li><a @click.prevent="setFilter('season', '當季')" href="#">當季</a></li>
            </ul>
          </div>
          <div class="overflowTable">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>單號</th>
                  <th>收益</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="(item, index) in filteredData" :key="index">
                  <td>{{ item.date }}</td>
                  <td>{{ item.orderId }}</td>
                  <td>{{ item.income }}</td>
                </tr>
              </tbody>
              <tfoot>
                <tr>
                  <td>總計</td>
                  <td colspan="2">{{ totalIncome }}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </section>
      </article>
    </main>
  </body>
</html>
